# nginx — static dashboard behind HTTP basic auth. No backend, no DB server.
# Serves the site and the exported JSON read-only from the shared volume.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    auth_basic "News Report Agent";
    auth_basic_user_file /etc/nginx/.htpasswd;

    location / {
        try_files $uri $uri/ =404;
    }

    # Exported JSON lives on the shared volume, mounted read-only.
    location = /export.json {
        alias /data/export.json;
    }
    location = /archive.json {
        alias /data/archive.json;
    }
}
