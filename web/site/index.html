<!doctype html>
<html lang="it">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>News Report Agent</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <main id="stories" class="grid"></main>

  <script src="app.js"></script>
</body>
</html>
