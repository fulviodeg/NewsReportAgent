# News Report Agent — pipeline configuration (illustrative values).
# Secrets are NOT here; they come from environment variables (see .env.example).
# See docs/v1-architecture.md (Section 6) for the meaning of each key.

[cadence]
collection_interval_minutes = 5
processing_interval_minutes = 360   # every 6 hours

[llm]
provider = "openrouter"
endpoint = "https://openrouter.ai/api/v1/chat/completions"
model_classify = "google/gemini-2.5-flash"     # live decision; verify on VPS
model_synthesize = "google/gemini-2.5-flash"    # same model in v1, separable later
max_retries = 4                     # bounded retries on transient errors
backoff_base_seconds = 1.0          # exponential backoff base
max_consecutive_failures = 5        # circuit breaker: abort run after N in a row

[embeddings]
# OpenRouter also serves an OpenAI-compatible /embeddings endpoint, so one key covers
# both LLM and embeddings. Swap provider/model/endpoint here to use a different vendor.
provider = "openrouter"
model = "openai/text-embedding-3-small"
endpoint = "https://openrouter.ai/api/v1/embeddings"

[clustering]
similarity_threshold = 0.82
window_hours = 72

[filters]
min_relevance = 0.3

[cost]
daily_usd_cap = 5.0

[classify]
# Fixed theme taxonomy: the LLM must pick from this list (validated). Edit freely.
themes = ["AI", "Fintech", "Cybersecurity", "Startup", "Policy/Regulation", "Big Tech", "Other"]

[dashboard]
refresh_seconds = 60

[[sources]]
name = "Example Testata"
from_address = "news@example.com"
# parse_hint = "css-selector-or-rule"   # optional per-sender hint
